<!DOCTYPE html>
<html>
<head>
    <title>Video Call by Name</title>
    <script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: white; }
        video { width: 45%; margin: 10px; border-radius: 10px; background: black; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { cursor: pointer; }
        .call { background: #25d366; color: white; }
        .end { background: #ff4d4d; color: white; }
        .settings { background: #555; color: white; }

        #popup {
            display: none;
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2 id="welcome"></h2>
<button class="settings" onclick="changeName()">Change Name</button>
<br>

<button onclick="startPeer()">Start</button>
<h3 id="status">Not connected</h3>

<input id="target" placeholder="Friend name/code">
<button class="call" onclick="callUser()">Call</button>
<button class="end" onclick="endCall()">End</button>

<div>
    <video id="local" autoplay muted playsinline></video>
    <video id="remote" autoplay playsinline></video>
</div>

<div id="popup">
    <p id="popup-text"></p>
    <button onclick="accept()">Accept</button>
    <button onclick="decline()">Decline</button>
</div>

<script>
let peer, localStream, currentCall, incomingCall;
let name = "";

// NAME SYSTEM - also used as Peer code
function initName() {
    const saved = localStorage.getItem("name");
    if (!saved) {
        name = prompt("Enter your name/code (letters/numbers only):");
        if (!name) { alert("Name required"); return; }
        localStorage.setItem("name", name);
    } else {
        name = saved;
    }
    document.getElementById("welcome").innerText = "Hi, " + name;
}

// Change name
function changeName() {
    const newName = prompt("Enter new name/code:");
    if (!newName) return;
    name = newName;
    localStorage.setItem("name", name);
    document.getElementById("welcome").innerText = "Hi, " + name;
}

// MEDIA
navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480 },
    audio: { echoCancellation: true, noiseSuppression: true }
})
.then(stream => {
    localStream = stream;
    document.getElementById("local").srcObject = stream;
})
.catch(err => alert("Camera error: " + err));

// START PEER
function startPeer() {
    if (!name) return alert("Set your name first");
    peer = new Peer(name, {
        config: {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" }
            ]
        }
    });

    peer.on("open", id => {
        document.getElementById("status").innerText = "Your name/code: " + id;
    });

    peer.on("call", call => {
        incomingCall = call;
        document.getElementById("popup").style.display = "block";
        document.getElementById("popup-text").innerText =
            call.peer + " is calling you";
    });

    peer.on("error", err => alert(err));
}

// CALL
function callUser() {
    if (!peer) return alert("Start first!");
    const id = document.getElementById("target").value;
    if (!id) return alert("Enter friend's name/code");

    const call = peer.call(id, localStream);
    currentCall = call;
    setup(call);
}

// ACCEPT / DECLINE
function accept() {
    currentCall = incomingCall;
    incomingCall.answer(localStream);
    setup(incomingCall);
    document.getElementById("popup").style.display = "none";
}

function decline() {
    if (incomingCall) incomingCall.close();
    incomingCall = null;
    document.getElementById("popup").style.display = "none";
}

// END CALL
function endCall() {
    if (currentCall) {
        currentCall.close();
        currentCall = null;
        document.getElementById("remote").srcObject = null;
    }
}

// SETUP
function setup(call) {
    call.on("stream", stream => {
        document.getElementById("remote").srcObject = stream;
    });
    call.on("close", () => {
        document.getElementById("remote").srcObject = null;
    });
}

// INIT
initName();
</script>

</body>
</html>
